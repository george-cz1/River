name: River
options:
  bundleIdPrefix: com.george
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  River:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: River
        excludes:
          - "**/*.md"
    info:
      path: River/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: River
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: true
        UIAppFonts:
          - CormorantGaramond-Light.ttf
          - Nunito-Regular.ttf
          - Nunito-Medium.ttf
          - Nunito-SemiBold.ttf
        CFBundleURLTypes:
          - CFBundleURLName: com.george.river
            CFBundleURLSchemes:
              - river
    entitlements:
      path: River/River.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.george.evolve
        com.apple.developer.family-controls: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.george.river
        DEVELOPMENT_TEAM: U4JCMYQA4X
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: RiverWidget
        embed: true
      - target: RiverDeviceActivityMonitor
        embed: true
      - target: RiverShieldConfiguration
        embed: true
      - target: RiverShieldAction
        embed: true

  RiverWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RiverWidget
      - path: River/Shared
        group: Shared
    info:
      path: RiverWidget/Info.plist
      properties:
        CFBundleDisplayName: RiverWidget
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: RiverWidget/RiverWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.george.evolve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.george.river.RiverWidget
        DEVELOPMENT_TEAM: U4JCMYQA4X
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground

  RiverDeviceActivityMonitor:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RiverDeviceActivityMonitor
    info:
      path: RiverDeviceActivityMonitor/Info.plist
      properties:
        CFBundleDisplayName: RiverDeviceActivityMonitor
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityMonitorExtension
    entitlements:
      path: RiverDeviceActivityMonitor/RiverDeviceActivityMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.george.evolve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.george.river.RiverDeviceActivityMonitor
        DEVELOPMENT_TEAM: U4JCMYQA4X
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: true

  RiverShieldConfiguration:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RiverShieldConfiguration
    info:
      path: RiverShieldConfiguration/Info.plist
      properties:
        CFBundleDisplayName: RiverShieldConfiguration
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
    entitlements:
      path: RiverShieldConfiguration/RiverShieldConfiguration.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.george.evolve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.george.river.RiverShieldConfiguration
        DEVELOPMENT_TEAM: U4JCMYQA4X
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: true

  RiverShieldAction:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RiverShieldAction
    info:
      path: RiverShieldAction/Info.plist
      properties:
        CFBundleDisplayName: RiverShieldAction
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-action
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension
    entitlements:
      path: RiverShieldAction/RiverShieldAction.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.george.evolve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.george.river.RiverShieldAction
        DEVELOPMENT_TEAM: U4JCMYQA4X
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: true

schemes:
  River:
    build:
      targets:
        River: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
